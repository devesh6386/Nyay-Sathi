services:
  - type: web
    name: nyay-sathi-backend
    env: python
    region: singapore   # closest to India
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true   # Render auto-generates a secure random secret
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        value: "sqlite:////opt/render/project/src/data/nyaysathi.db"
      - key: UPLOAD_DIR
        value: "/opt/render/project/src/data/uploads"
      - key: VECTOR_STORE_DIR
        value: "/opt/render/project/src/data/chroma_db"
    disk:
      name: nyay-sathi-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
